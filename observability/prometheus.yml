global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "worker"
    dns_sd_configs:
      - names:
          - "worker"
        type: "A"
        port: 8001

  - job_name: "producer"
    dns_sd_configs:
      - names:
          - "producer"
        type: "A"
        port: 8000
