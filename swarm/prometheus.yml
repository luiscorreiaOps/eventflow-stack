global:
  scrape_interval: 2s

scrape_configs:

- job_name: "prometheus"
  static_configs:
  - targets: [ "localhost:9090" ]

- job_name: "cadvisor"
  static_configs:
  - targets: [ "redecor_cadvisor:8080" ]

- job_name: "worker"
  static_configs:
  - targets: [ "redecor_worker:8001" ]

- job_name: "producer"
  static_configs:
  - targets: [ "redecor_producer:8000" ]
